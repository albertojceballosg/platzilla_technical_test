# Nota: la clave 'version' es obsoleta en Docker Compose v2 (se ignora y emite aviso);
# por eso se omite. El esquema de servicios es el mismo.

services:
  web:
    build: .
    container_name: platzilla_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        # Esperar a que la BD esté realmente lista (import del dump incluido),
        # no solo a que el contenedor arranque.
        condition: service_healthy

  db:
    image: mariadb:10.5
    container_name: platzilla_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pg_crm_madre
      MYSQL_USER: superuser
      MYSQL_PASSWORD: 8hYLKcthnx
    ports:
      - "33066:3306"
    volumes:
      - ./db_init:/docker-entrypoint-initdb.d
      - platzilla_db_data:/var/lib/mysql
    # --sql-mode: red de compatibilidad transitoria para el legacy sobre MariaDB 10.5.
    # 10.5 arranca con STRICT_TRANS_TABLES, que en 5.6 no existía y rompe escrituras
    # laxas de la app (p.ej. '' en columnas ENUM -> ERROR 1265). NO_ENGINE_SUBSTITUTION
    # quita strict manteniendo la seguridad de motores, imitando a MySQL 5.6.
    # El arreglo definitivo de los datos ya cargados está en db_init/zz-sanitize-enums.sql.
    # Ver docs/COMPATIBILIDAD_MARIADB105.md.
    command: --character-set-server=utf8 --collation-server=utf8_general_ci --sql-mode=NO_ENGINE_SUBSTITUTION
    healthcheck:
      # healthcheck.sh viene con la imagen MariaDB; usa el usuario 'healthcheck' interno.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s   # margen para el import inicial del dump (~103 MB)

volumes:
  platzilla_db_data:
